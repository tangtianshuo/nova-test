version: '3.8'

services:
  # Nova Test Executor (Python FastAPI)
  executor:
    build:
      context: ./executor-python
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://nova:password@postgres:5432/nova_test
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin123
      - S3_BUCKET=nova-test
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

  # Nova Test Frontend (Node.js)
  frontend:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://executor:8002
      - DATABASE_URL=postgresql://postgres:5432/nova_test
      - REDIS_URL=redis://redis:6379
    depends_on:
      - executor
      - postgres
      - redis

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nova_test
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # MinIO (S3 兼容对象存储)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres_data:
  minio_data:
